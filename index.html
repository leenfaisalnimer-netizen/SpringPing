<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SpringPing — Welcome</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body class="welcome-page">
    <!--WELCOME CARD 
         Spring Fest logo
         Title + subtitle
         Avatar uploader
         Name field
         Join button  -->
    <main class="welcome-card">
      <img src="assets/logo.png" alt="Spring Fest" class="welcome-logo" />

      <h1 class="welcome-title">SpringPing</h1>
      <p class="welcome-subtitle">
        Connect with your classmates on the same network
      </p>

      <!-- AVATAR UPLOADER  -->
      <label class="avatar-upload" id="avatarUpload">
        <span class="avatar-placeholder" id="avatarPlaceholder">
          Click to<br />upload photo
        </span>
        <img id="avatarPreview" alt="" style="display: none" />
        <input type="file" id="avatarInput" accept="image/*" />
      </label>

      <!--NAME INPUT + JOIN BUTTON-->
      <div class="mb-3 text-start">
        <label for="nameInput" class="form-label small text-muted mb-1"
          >User Name</label
        >
        <input
          type="text"
          id="nameInput"
          class="form-control"
          placeholder="Type your name .. "
          maxlength="30"
        />
      </div>

      <button
        type="button"
        id="joinBtn"
        class="btn btn-primary w-100 mt-2"
        disabled
      >
        Join
      </button>

      <!-- error slot -->
      <p
        id="errorMsg"
        class="text-danger small mt-2 mb-0"
        style="min-height: 1.2em"
      ></p>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
